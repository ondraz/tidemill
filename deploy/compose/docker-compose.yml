services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: subscriptions
      POSTGRES_USER: subscriptions
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U subscriptions"]
      interval: 5s
      timeout: 3s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:v24.3.7
    restart: unless-stopped
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092
    volumes:
      - redpanda_data:/var/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../../
      dockerfile: deploy/compose/Dockerfile
    restart: unless-stopped
    command: >
      uv run uvicorn subscriptions.api.app:app
      --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql+asyncpg://subscriptions:${POSTGRES_PASSWORD}@postgres:5432/subscriptions
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      STRIPE_API_KEY: ${STRIPE_API_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    expose:
      - "8000"

  worker:
    build:
      context: ../../
      dockerfile: deploy/compose/Dockerfile
    restart: unless-stopped
    command: uv run python -m subscriptions.worker
    environment:
      DATABASE_URL: postgresql+asyncpg://subscriptions:${POSTGRES_PASSWORD}@postgres:5432/subscriptions
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      api:
        condition: service_started
        required: false

volumes:
  postgres_data:
  redpanda_data:
  caddy_data:
