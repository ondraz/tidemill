services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: tidemill
      POSTGRES_USER: tidemill
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tidemill"]
      interval: 5s
      timeout: 3s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:v24.3.7
    restart: unless-stopped
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092
    volumes:
      - redpanda_data:/var/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../../
      dockerfile: deploy/compose/Dockerfile
      target: full
    restart: unless-stopped
    command: >
      uv run uvicorn tidemill.api.app:app
      --host 0.0.0.0 --port 8000
    environment:
      TIDEMILL_DATABASE_URL: postgresql+asyncpg://tidemill:${POSTGRES_PASSWORD}@postgres:5432/tidemill
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      STRIPE_API_KEY: ${STRIPE_API_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
      CLERK_JWKS_URL: ${CLERK_JWKS_URL:-}
      CORS_ORIGINS: https://${DOMAIN:-localhost}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - frontend_assets:/srv/frontend

  worker:
    build:
      context: ../../
      dockerfile: deploy/compose/Dockerfile
      target: api
    restart: unless-stopped
    command: uv run python -m tidemill.worker
    environment:
      TIDEMILL_DATABASE_URL: postgresql+asyncpg://tidemill:${POSTGRES_PASSWORD}@postgres:5432/tidemill
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - frontend_assets:/srv/frontend:ro
    depends_on:
      api:
        condition: service_started
        required: false

volumes:
  postgres_data:
  redpanda_data:
  caddy_data:
  frontend_assets:
