# Local development: run API from your IDE (VS Code debugger), only
# infrastructure services in Docker.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# Then start the API and worker from VS Code (or terminal):
#   TIDEMILL_DATABASE_URL=postgresql+asyncpg://tidemill:<POSTGRES_PASSWORD>@localhost:5432/tidemill \
#   KAFKA_BOOTSTRAP_SERVERS=localhost:9092 \
#   AUTH_ENABLED=false \
#   uv run uvicorn tidemill.api.app:app --host 0.0.0.0 --port 8000 --reload
#
# Use the POSTGRES_PASSWORD from deploy/compose/.env

services:
  postgres:
    ports:
      - "5432:5432"

  redpanda:
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"

  api:
    profiles: [disabled]

  worker:
    profiles: [disabled]

  caddy:
    profiles: [disabled]
