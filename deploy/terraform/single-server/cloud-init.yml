#cloud-config

package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - git
  - unattended-upgrades

# Install Docker and Tailscale, lock down SSH to Tailscale only
runcmd:
  # Install Docker
  - curl -fsSL https://get.docker.com | sh

  # Install Tailscale
  - curl -fsSL https://tailscale.com/install.sh | sh
  - tailscale up --authkey=${tailscale_auth_key} --ssh

  # Bind sshd to Tailscale interface only (blocks public SSH)
  - |
    mkdir -p /etc/ssh/sshd_config.d
    cat > /etc/ssh/sshd_config.d/10-tailscale-only.conf <<'SSHEOF'
    ListenAddress 100.64.0.0/10
    SSHEOF
  - |
    TAILSCALE_IP=$(tailscale ip -4)
    sed -i "s|ListenAddress 100.64.0.0/10|ListenAddress $TAILSCALE_IP|" \
      /etc/ssh/sshd_config.d/10-tailscale-only.conf
    systemctl restart sshd

  # Clone repo and start services
  - git clone https://github.com/ondraz/tidemill.git /opt/tidemill
  - cd /opt/tidemill/deploy/compose

  # Generate secrets and write .env
  - |
    cat > /opt/tidemill/deploy/compose/.env <<EOF
    POSTGRES_PASSWORD=$(openssl rand -hex 24)
    DOMAIN=${domain}
    STRIPE_API_KEY=${stripe_api_key}
    STRIPE_WEBHOOK_SECRET=${stripe_webhook_secret}
    AUTH_ENABLED=true
    CLERK_PUBLISHABLE_KEY=${clerk_publishable_key}
    CLERK_SECRET_KEY=${clerk_secret_key}
    CLERK_JWKS_URL=${clerk_jwks_url}
    EOF

  # Start services
  - docker compose -f /opt/tidemill/deploy/compose/docker-compose.yml up -d

  # Enable automatic security updates
  - systemctl enable --now unattended-upgrades

# Reboot after initial setup if kernel was updated
power_state:
  delay: now
  mode: reboot
  condition: test -f /var/run/reboot-required
