site_name: Subscriptions
site_url: https://ondraz.github.io/subscriptions/
repo_url: https://github.com/ondraz/subscriptions
repo_name: ondraz/subscriptions

docs_dir: .
site_dir: ../site

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Research:
      - Market Overview: research/market-overview.md
      - Business Models: research/business-models.md
      - Pricing & Billing: research/pricing-and-billing.md
      - Billing Engines: research/billing-engines.md
      - Analytics Tools: research/analytics-tools.md
      - Competitive Matrix: research/competitive-matrix.md
      - Product Positioning: research/product-positioning.md
