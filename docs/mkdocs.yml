site_name: Subscriptions
site_url: https://ondraz.github.io/subscriptions/
repo_url: https://github.com/ondraz/subscriptions
repo_name: ondraz/subscriptions

docs_dir: .
site_dir: ../site

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture:
      - Overview: architecture/overview.md
      - Events: architecture/events.md
      - Database: architecture/database.md
      - Connectors: architecture/connectors.md
      - Cubes & Query Algebra: architecture/cubes.md
      - Metrics: architecture/metrics.md
      - API: architecture/api.md
      - Deployment: architecture/deployment.md
      - Testing: architecture/testing.md
  - Research:
      - Market Overview: research/market-overview.md
      - Business Models: research/business-models.md
      - Pricing & Billing: research/pricing-and-billing.md
      - Billing Engines: research/billing-engines.md
      - Analytics Tools: research/analytics-tools.md
      - Competitive Matrix: research/competitive-matrix.md
      - Product Positioning: research/product-positioning.md
