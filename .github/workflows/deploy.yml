name: Deploy to Hetzner

on:
  push:
    tags:
      - "release-*"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy
        run: |
          ssh -o StrictHostKeyChecking=no root@tidemill 'bash -s' <<EOF
            set -euxo pipefail
            # /opt/tidemill is owned by the tidemill system user (cloud-init);
            # tidemill has 'nologin' shell so we can't SSH as them directly.
            # runuser bypasses PAM/login-shell restrictions and runs the
            # git + docker commands under the owner so checkouts actually
            # rewrite files and docker compose hits the right project namespace.
            runuser -u tidemill -- bash -ec '
              cd /opt/tidemill
              git fetch --tags --force
              git checkout ${{ github.ref_name }}
              git rev-parse HEAD
              docker compose -f deploy/compose/docker-compose.yml build
              docker compose -f deploy/compose/docker-compose.yml up -d --force-recreate
            '
          EOF
